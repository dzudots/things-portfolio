name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          THINGS_SECRET_KEY: ci-test-secret-not-for-production
          THINGS_AI_FORCE_MOCK: "1"
        run: python -m unittest discover -s tests -v

  prod-smoke:
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Production smoke (optional)
        env:
          THINGS_PROD_URL: ${{ secrets.THINGS_PROD_URL }}
        run: |
          if [ -z "$THINGS_PROD_URL" ]; then
            echo "THINGS_PROD_URL not set — skipping prod smoke"
            exit 0
          fi
          python scripts/prod_smoke.py
